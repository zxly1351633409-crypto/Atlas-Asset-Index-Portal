name: Verify and package Windows demo

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-demo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Test
        run: npm test
      - name: Build Windows bootstrap package
        shell: powershell
        run: .\tools\release\Build-PortablePackage.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: Atlas-Portal-Windows-v0.2.1
          path: |
            release/Atlas-Portal-Windows-v0.2.1.zip
            release/Atlas-Portal-Windows-v0.2.1.zip.sha256.txt
          if-no-files-found: error
